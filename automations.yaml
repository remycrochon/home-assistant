      - if:
        - condition: template
          value_template: '{{ delta_pos | int(0) >= 5 }}'
        then:
        - action: cover.set_cover_position
          target:
            entity_id: cover.volet_ch_sud
          data:
            position: '{{ target_pos | int(100) }}'
    default:
    - action: input_text.set_value
      data:
        value: 'Trigger={{ trigger.id }}

          Heure ouverture={{states(''input_datetime.heure_ouverture_volet_sud'')[:5]
