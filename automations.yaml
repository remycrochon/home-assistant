- id: '1777273219869'
  alias: Rapport Piscine Journalier IA
  description: ''
  triggers:
  - trigger: time
    at: '21:45:00'
  conditions: []
  actions:
  - variables:
      date_jour: '{{ now().strftime(''%d/%m/%Y %H:%M'') }}'
      temp_eau_txt: "{% set v = states('sensor.esp178_piscine_temperature_eau') %}
        {% if v in ['unknown', 'unavailable', 'none', 'None', ''] %}\n  n/d\n{% else
        %}\n  {{ (v | float(0)) | round(1) }} °C\n{% endif %}"
      temp_ext_txt: "{% set v = states('sensor.vp2_temp_out') %} {% if v in ['unknown',
        'unavailable', 'none', 'None', ''] %}\n  n/d\n{% else %}\n  {{ (v | float(0))
        | round(1) }} °C\n{% endif %}"
      ph_txt: "{% set v = states('sensor.esp178_piscine_ph_ezo_filtre') %} {% if v
        in ['unknown', 'unavailable', 'none', 'None', ''] %}\n  n/d\n{% else %}\n
        \ {{ (v | float(0)) | round(2) }}\n{% endif %}"
      ph_cible_txt: "{% set v = states('number.esp178_piscine_ph_cible') %} {% if
        v in ['unknown', 'unavailable', 'none', 'None', ''] %}\n  7.2\n{% else %}\n
        \ {{ (v | float(0)) | round(2) }}\n{% endif %}"
      orp_txt: "{% set v = states('sensor.esp178_piscine_orp_ezo_filtre') %} {% if
        v in ['unknown', 'unavailable', 'none', 'None', ''] %}\n  n/d\n{% else %}\n
        \ {{ (v | float(0)) | round(0) }} mV\n{% endif %}"
      orp_cible_txt: "{% set v = states('number.esp178_piscine_consigne_orp') %} {%
        if v in ['unknown', 'unavailable', 'none', 'None', ''] %}\n  700\n{% else
        %}\n  {{ (v | float(0)) | round(0) }}\n{% endif %}"
      chlore_libre_txt: "{% set v = states('sensor.my_sampling_point_pl_chlorine_free')
        %} {% if v in ['unknown', 'unavailable', 'none', 'None', ''] %}\n  n/d\n{%
        else %}\n  {{ (v | float(0)) | round(2) }} ppm\n{% endif %}"
      pression_filtre_txt: "{% set v = states('sensor.esp178_piscine_pression_filtre')
        %} {% if v in ['unknown', 'unavailable', 'none', 'None', ''] %}\n  n/d\n{%
        else %}\n  {{ (v | float(0)) | round(2) }} bar\n{% endif %}"
      mode_filtration_txt: '{{ states(''select.esp178_piscine_mode_fonctionnement_filtration'')
        }}'
      temps_filtration_txt: "{% set v = states('sensor.esp178_piscine_temps_ma_ppe_piscine_jour')
        %} {% if v in ['unknown', 'unavailable', 'none', 'None', ''] %}\n  n/d\n{%
        else %}\n  {{ v }}\n{% endif %}"
      energie_jour_txt: "{% set v = states('sensor.compteur_energie_piscine_jour_hp_hc')
        %} {% if v in ['unknown', 'unavailable', 'none', 'None', ''] %}\n  n/d\n{%
        else %}\n  {{ (v | float(0)) | round(2) }} kWh\n{% endif %}"
      conso_ph_jour_txt: "{% set v = states('sensor.esp178_piscine_conso_ph_jour')
        %} {% if v in ['unknown', 'unavailable', 'none', 'None', ''] %}\n  n/d\n{%
        else %}\n  {{ v }}\n{% endif %}"
      conso_chl_jour_txt: "{% set v = states('sensor.esp178_piscine_conso_chl_jour')
        %} {% if v in ['unknown', 'unavailable', 'none', 'None', ''] %}\n  n/d\n{%
        else %}\n  {{ v }}\n{% endif %}"
      poids_chlore_txt: "{% set v = states('sensor.esp129_pesage_chlore_poids_chlore')
        %} {% if v in ['unknown', 'unavailable', 'none', 'None', ''] %}\n  n/d\n{%
        else %}\n  {{ v }}\n{% endif %}"
      appoint_eau_jour_txt: "{% set v = states('sensor.esp173_cpt_eau_piscine') %}
        {% if v in ['unknown', 'unavailable', 'none', 'None', ''] %}\n  n/d\n{% else
        %}\n  {{ v }}\n{% endif %}"
      niveau_txt: "{% if is_state('binary_sensor.esp178_piscine_niv_defaut', 'on')
        %}\n  défaut niveau\n{% elif is_state('binary_sensor.esp178_piscine_niv_bas',
        'on') %}\n  niveau bas\n{% elif is_state('binary_sensor.esp178_piscine_niv_inter',
        'on') %}\n  niveau intermédiaire\n{% elif is_state('binary_sensor.esp178_piscine_niv_haut',
        'on') %}\n  niveau haut\n{% else %}\n  niveau inconnu\n{% endif %}"
      volet_txt: "{% if is_state('binary_sensor.esp178_piscine_volet_ferme', 'on')
        %}\n  fermé\n{% elif is_state('binary_sensor.esp178_piscine_volet_ouvert',
        'on') %}\n  ouvert\n{% else %}\n  intermédiaire / inconnu\n{% endif %}"
      statut_esp_txt: "{% if is_state('binary_sensor.esp178_piscine_status', 'on')
        %}\n  connecté\n{% else %}\n  hors ligne\n{% endif %}"
  - action: ai_task.generate_data
    continue_on_error: false
    response_variable: recap_piscine
    data:
      task_name: recap piscine journalier
      entity_id: ai_task.google_ai_task
      instructions: 'Tu es un assistant de suivi piscine.

        Rédige un message Telegram en français. Sois factuel, clair, compact et utile.
        N''invente aucune donnée. Si une donnée vaut "n/d", indique simplement qu''elle
        n''est pas disponible. 8 lignes maximum. Commence par un emoji.

        Structure souhaitée : - 1 ligne synthèse globale, - 1 à 2 lignes qualité de
        l''eau, - 1 à 2 lignes fonctionnement / filtration, - 1 ligne consommations
        / produits, - 1 ligne état général / anomalies éventuelles, - 1 courte recommandation
        si nécessaire.

        Interprétation attendue : - comparer le pH à sa cible, - comparer l''ORP à
        sa consigne, - signaler si la pression filtre paraît élevée, - commenter brièvement
        le temps de filtration et l''énergie du jour, - signaler tout point d''attention
        sur niveau, volet, appoint d''eau ou connexion ESP.

        Données : - Date : {{ date_jour }} - Température eau : {{ temp_eau_txt }}
        - Température extérieure : {{ temp_ext_txt }} - pH filtré : {{ ph_txt }} -
        pH cible : {{ ph_cible_txt }} - ORP filtré : {{ orp_txt }} - ORP cible : {{
        orp_cible_txt }} mV - Chlore libre : {{ chlore_libre_txt }} - Pression filtre
        : {{ pression_filtre_txt }} - Mode filtration : {{ mode_filtration_txt }}
        - Temps filtration du jour : {{ temps_filtration_txt }} - Energie piscine
        du jour : {{ energie_jour_txt }} - Consommation pH du jour : {{ conso_ph_jour_txt
        }} - Consommation chlore du jour : {{ conso_chl_jour_txt }} - Poids chlore
        restant : {{ poids_chlore_txt }} - Appoint eau du jour : {{ appoint_eau_jour_txt
        }} - Etat niveau : {{ niveau_txt }} - Etat volet : {{ volet_txt }} - Etat
        ESP piscine : {{ statut_esp_txt }}'
      structure:
        titre:
          description: Titre court du message
          required: true
          selector:
            text:
        message:
          description: Message Telegram complet
          required: true
          selector:
            text:
        niveau:
          description: Niveau global parmi INFO, VIGILANCE ou ALERTE
          required: true
          selector:
            text:
  - choose:
    - conditions:
      - condition: template
        value_template: "{{\n  recap_piscine is defined\n  and recap_piscine.data
          is defined\n  and recap_piscine.data is mapping\n  and recap_piscine.data.message
          is defined\n  and (recap_piscine.data.message | string | trim | length)
          > 0\n}}"
      sequence:
      - action: telegram_bot.send_message
        data:
          config_entry_id: 01JZDD4YV6TJXXZ0BGJ3BDGD5A
          title: "{{\n  recap_piscine.data.titre\n  if recap_piscine.data.titre is
            defined\n  else 'Rapport Piscine'\n}}"
          message: '{{ recap_piscine.data.message }} {% if recap_piscine.data.niveau
            is defined %} {{ ''\n'' }}Niveau : {{ recap_piscine.data.niveau }} {%
            endif %}'
    default:
    - action: telegram_bot.send_message
      data:
        config_entry_id: 01JZDD4YV6TJXXZ0BGJ3BDGD5A
        title: Rapport Piscine
        message: 'Fallback utilisé : pas de réponse IA structurée exploitable.'
  mode: single
