  mode: single
- id: '1751955751827'
  alias: Volets Suivi Azimuth Soleil bureau été (progressif)
  description: 'Fermeture progressive des volets en fonction de l''élévation du soleil,
    de la radiation et de la température

    '
  triggers:
  - minutes: /10
    trigger: time_pattern
  conditions:
  - condition: state
    entity_id: input_select.volets
    state: Auto Pos Soleil
  - condition: sun
    before: sunset
    after: sunrise
  actions:
  - variables:
      orientation_volet: '{{ states(''input_number.orientation_volet_bureau'') | float
        }}'
      angle_exposition: '{{ states(''input_number.angle_exposition_volet_bureau'')
        | float }}'
      elevation_min: '{{ states(''input_number.elevation_mini_volets_bureaux'') |
        float }}'
      ouverture_min: 0
      ouverture_max: 100
      azimut_soleil: '{{ state_attr(''sun.sun'', ''azimuth'') | float }}'
      elevation_soleil: '{{ state_attr(''sun.sun'', ''elevation'') | float }}'
      azimut_min: '{{ orientation_volet - angle_exposition }}'
      azimut_max: '{{ orientation_volet + angle_exposition }}'
      radiation_solaire: '{{ states(''sensor.vp2_radiation'') | float }}'
      radiation_seuil: '{{ states(''input_number.radiation_seuil_volets'') | float(0)
        }}'
      temperature_ext: '{{ states(''sensor.vp2_temp_out'') | float }}'
      temperature_seuil: '{{ states(''input_number.temperature_seuil_volets'') | float(30)
        }}'
      fermeture_brute: "{% if elevation_soleil < elevation_min %}\n  100\n{% else
        %}\n  {{ 100 - (((elevation_soleil - elevation_min) / (90 - elevation_min))
        * 100) | round(0) }}\n{% endif %}"
      fermeture_finale: '{% set pos = fermeture_brute | float %} {% set pos = [pos,
        ouverture_max] | min %} {% set pos = [pos, ouverture_min] | max %} {{ pos
        | round(0) }}'
      position_effective: "{% if azimut_min <= azimut_soleil <= azimut_max and temperature_ext
        > temperature_seuil %}\n  0\n{% elif azimut_min <= azimut_soleil <= azimut_max
        and elevation_soleil > elevation_min and radiation_solaire > radiation_seuil
        %}\n  {{ fermeture_finale }}\n{% elif radiation_solaire <= radiation_seuil
        and temperature_ext <= temperature_seuil %}\n  100\n{% else %}\n  unknown\n{%
        endif %}"
  - data:
      message: 'Debug volet bureau (progressif) :Azimut={{ azimut_soleil }} ({{ azimut_min
        }} → {{ azimut_max }}), Élévation={{ elevation_soleil }}, Radiation={{ radiation_solaire
        }} > seuil={{ radiation_seuil }}, Température={{ temperature_ext }} > seuil={{
        temperature_seuil }}, fermeture_brute={{ fermeture_brute }}, clampée={{ fermeture_finale
        }}, appliquée={{ position_effective }}

        '
    action: system_log.write
  - target:
      entity_id: input_text.volets_debug_bureau
    data:
      value: "Azimut={{ azimut_soleil }} ({{ azimut_min }} → {{ azimut_max }}) \n|
        Élévation={{ elevation_soleil }}\n| Radiation={{ radiation_solaire }} (seuil={{
        radiation_seuil }})\n| Temp={{ temperature_ext }} (seuil={{ temperature_seuil
        }})\n| fermeture_brute={{ fermeture_brute }} → clampée={{ fermeture_finale
        }} → appliquée={{ position_effective }}"
    action: input_text.set_value
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ azimut_min <= azimut_soleil <= azimut_max and temperature_ext
          > temperature_seuil }}'
      sequence:
      - data:
          position: 0
        target:
          entity_id:
          - cover.bureau_droit_2
          - cover.bureau_gauche_rts
        action: cover.set_cover_position
    - conditions:
      - condition: template
        value_template: '{{ azimut_min <= azimut_soleil <= azimut_max and elevation_soleil
          > elevation_min and radiation_solaire > radiation_seuil and temperature_ext
          <= temperature_seuil }}'
      sequence:
      - data:
          position: '{{ fermeture_finale }}'
        target:
          entity_id:
          - cover.bureau_droit_2
          - cover.bureau_gauche_rts
        action: cover.set_cover_position
    - conditions:
      - condition: template
        value_template: '{{ radiation_solaire <= radiation_seuil and temperature_ext
          <= temperature_seuil }}'
      sequence:
      - data:
          position: 100
        target:
          entity_id:
          - cover.bureau_gauche_rts
          - cover.bureau_droit_rts
        action: cover.set_cover_position
  mode: single
