        endif %}"
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ trigger.id == ''morning_open'' }}'
      sequence:
      - variables:
          target_pos: 100
          reason: ouverture programmée à l'heure réglable
          delta_pos: '{{ ((current_pos | int(100)) - 100) | abs }}'
      - action: input_text.set_value
        data:
