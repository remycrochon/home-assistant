  - trigger: template
    id: nuit_vers_jour
    value_template: "{{ states('sensor.bh1750_illuminance') | float(0)\n   > states('input_number.luminosite_seuil_haut')
      | float(0)\n   and is_state('sun.sun', 'above_horizon') }}"
  - trigger: time
    at: input_datetime.horaire_ete_volet_ouv
    id: heure_ouv_ete
  - trigger: time
    at: input_datetime.horaire_ete_volet_ferm
    id: heure_ferm_ete
  - trigger: time
    at: input_datetime.horaire_hiver_volet_ouv
    id: ouv_hiv
  actions:
  - variables:
      lux: '{{ states(''sensor.bh1750_illuminance'') | float(0) }}'
      seuil_haut: '{{ states(''input_number.luminosite_seuil_haut'') | float(0) }}'
      seuil_bas: '{{ states(''input_number.luminosite_seuil_bas'') | float(0) }}'
      is_day_now: '{{ lux > seuil_haut and is_state(''sun.sun'', ''above_horizon'')
        }}'
      is_night_now: '{{ lux < seuil_bas and is_state(''sun.sun'', ''below_horizon'')
        }}'
      mode_volets: '{{ states(''input_select.volets'') }}'
  - choose:
    - conditions:
      - condition: state
        entity_id: input_select.volets
        state: Auto Hiv
      - condition: trigger
        id: jour_vers_nuit
      sequence:
      - action: script.1706464871250
    - conditions:
      - condition: state
        entity_id: input_select.volets
        state: Auto Hiv
      - condition: trigger
        id: ouv_hiv
      sequence:
      - action: script.0_0_1_ouverture_volets_rts
    - conditions:
      - condition: state
        entity_id: input_select.volets
        state: Auto Hiv
      - condition: trigger
        id: ha_start
      - condition: template
        value_template: '{{ is_night_now }}'
      sequence:
      - action: script.1706464871250
    - conditions:
      - condition: state
        entity_id: input_select.volets
        state: Auto Ete
      - condition: trigger
        id: heure_ouv_ete
      sequence:
      - action: script.0_0_1_ouverture_volets_rts
    - conditions:
      - condition: state
        entity_id: input_select.volets
        state: Auto Ete
      - condition: trigger
        id: heure_ferm_ete
      sequence:
      - action: script.1706464871250
    - conditions:
      - condition: state
        entity_id: input_select.volets
        state: Absent
      - condition: trigger
        id: jour_vers_nuit
      sequence:
      - action: script.0_1_0_fermeture_volets_mode_absent_rts
    - conditions:
      - condition: state
        entity_id: input_select.volets
        state: Absent
      - condition: trigger
        id: nuit_vers_jour
      sequence:
      - action: script.0_1_1_ouverture_volets_mode_absent_rts
    - conditions:
