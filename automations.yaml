          message: '{{ rapport_dess_ia.data }}'
    default:
    - action: telegram_bot.send_message
      metadata: {}
      data:
        config_entry_id: 01JZDD4YV6TJXXZ0BGJ3BDGD5A
        title: Rapport DESS 22h
        message: "    {{ date_snapshot }}{{-\"\\n\"-}}\n    Prévi demain = {{ previ_prod_demain
          }} kWh{{-\"\\n\"-}}\n    Forçage DESS = {{ forcage_actif_txt }}{% if forcage_actif_num
          == 1 %} / Niveau = {{ niveau_forcage }} %{% endif %}{{-\"\\n\"-}}\n    SOC
          cible = {{ soc_cible }} % / Actuel = {{ soc_actuel }} %{{-\"\\n\"-}}\n    Ecart
          SOC-cible = {{ ecart_soc_cible_txt }}{% if forcage_actif_num == 1 %} / Ecart
          SOC-forçage = {{ ecart_soc_forcage_txt }}{% endif %}{{-\"\\n\"-}}\n    SOC
          prévu à 05:45 sans charge = {{ soc_prevu_0545_sans_charge }} %{{-\"\\n\"-}}\n
          \   Charge prévisionnelle = {{ synthese_charge_previ_txt }}\n"
  - action: notify.send_message
    target:
      entity_id: notify.suivi_dess
    data:
      message: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}, {{ previ_prod_demain
        }}, {{ forcage_actif_num }}, {{ niveau_forcage if forcage_actif_num == 1 else
        '''' }}, {{ soc_cible }}, {{ soc_actuel }}, {{ ecart_soc_cible_txt | replace(''
        %'','''') }}, {{ ecart_soc_forcage_txt | replace('' %'','''') if forcage_actif_num
        == 1 else '''' }}, {{ perte_nuit_estimee_pct }}, {{ soc_prevu_0545_sans_charge
        }}, {{ besoin_corrige_pct_txt }}, {{ heure_debut_charge_previ_txt }}, {{ heure_fin_charge_txt
        }}, {{ duree_charge_previ_min_txt }}'
  - delay:
      hours: 0
      minutes: 1
      seconds: 0
      milliseconds: 0
  - action: input_number.set_value
    data:
      value: '{% set a = states(''sensor.victron_remote_monitoring_production_d_energie_estimee_demain'')
