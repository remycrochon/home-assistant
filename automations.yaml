- id: '1773999155732'
  alias: Rapport 23:59 Journalier Recap Energie IA V2
  description: ''
  triggers:
  - trigger: time
    at: '23:59:00'
  conditions: []
  actions:
  - variables:
      date_jour: '{{ now().strftime(''%d/%m/%Y %H:%M'') }}'
      conso_totale: '{{ states(''sensor.compteur_energie_total_jour_tous_tarifs'')
        | float(0) | round(2) }}'
      bleu_hc: '{{ states(''sensor.compteur_energie_hc_bleu_jour'') | float(0) | round(2)
        }}'
      bleu_hp: '{{ states(''sensor.compteur_energie_hp_bleu_jour'') | float(0) | round(2)
        }}'
      blanc_hc: '{{ states(''sensor.compteur_energie_hc_blanc_jour'') | float(0) |
        round(2) }}'
      blanc_hp: '{{ states(''sensor.compteur_energie_hp_blanc_jour'') | float(0) |
        round(2) }}'
      rouge_hc: '{{ states(''sensor.compteur_energie_hc_rouge_jour'') | float(0) |
        round(2) }}'
      rouge_hp: '{{ states(''sensor.compteur_energie_hp_rouge_jour'') | float(0) |
        round(2) }}'
      total_hc: "{{\n  (\n    states('sensor.compteur_energie_hc_bleu_jour') | float(0)
        +\n    states('sensor.compteur_energie_hc_blanc_jour') | float(0) +\n    states('sensor.compteur_energie_hc_rouge_jour')
        | float(0)\n  ) | round(2)\n}}"
      total_hp: "{{\n  (\n    states('sensor.compteur_energie_hp_bleu_jour') | float(0)
        +\n    states('sensor.compteur_energie_hp_blanc_jour') | float(0) +\n    states('sensor.compteur_energie_hp_rouge_jour')
        | float(0)\n  ) | round(2)\n}}"
      poste_dominant: "{% set postes = {\n  'Bleu HC': states('sensor.compteur_energie_hc_bleu_jour')
        | float(0),\n  'Bleu HP': states('sensor.compteur_energie_hp_bleu_jour') |
        float(0),\n  'Blanc HC': states('sensor.compteur_energie_hc_blanc_jour') |
        float(0),\n  'Blanc HP': states('sensor.compteur_energie_hp_blanc_jour') |
        float(0),\n  'Rouge HC': states('sensor.compteur_energie_hc_rouge_jour') |
        float(0),\n  'Rouge HP': states('sensor.compteur_energie_hp_rouge_jour') |
        float(0)\n} %} {{ postes | dictsort(by='value') | last | first }}"
      couleur_demain: '{{ states(''sensor.rte_tempo_prochaine_couleur'') }}'
      cout_jour_txt: "{% set v = states('sensor.cout_energie_hc_hp_tous_tarifs') %}
        {% if v in ['unknown', 'unavailable', 'none', 'None', ''] %}\n  n/d\n{% else
        %}\n  {{ (v | float(0)) | round(2) }} €\n{% endif %}"
      pv_jour_txt: "{% set v = states('sensor.mp2_total_energie_produite_jour') %}
        {% if v in ['unknown', 'unavailable', 'none', 'None', ''] %}\n  n/d\n{% else
        %}\n  {{ (v | float(0)) | round(2) }} kWh\n{% endif %}"
      import_reseau_txt: "{% set v = states('sensor.mp2_energie_soutiree_du_reseau_par_jour')
        %} {% if v in ['unknown', 'unavailable', 'none', 'None', ''] %}\n  n/d\n{%
        else %}\n  {{ (v | float(0)) | round(2) }} kWh\n{% endif %}"
      export_reseau_txt: "{% set v = states('sensor.mp2_energie_injectee_ds_reseau_par_jour')
        %} {% if v in ['unknown', 'unavailable', 'none', 'None', ''] %}\n  n/d\n{%
        else %}\n  {{ (v | float(0)) | round(2) }} kWh\n{% endif %}"
      bat_min_txt: "{% set v = states('sensor.soc_mini') %} {% if v in ['unknown',
        'unavailable', 'none', 'None', ''] %}\n  n/d\n{% else %}\n  {{ (v | float(0))
        | round(1) }} %\n{% endif %}"
      bat_max_txt: "{% set v = states('sensor.soc_maxi') %} {% if v in ['unknown',
        'unavailable', 'none', 'None', ''] %}\n  n/d\n{% else %}\n  {{ (v | float(0))
        | round(1) }} %\n{% endif %}"
      soc_soir_txt: "{% set v = states('sensor.victron_mqtt_c0619ab1db0d_system_0_system_dc_battery_soc')
        %} {% if v in ['unknown', 'unavailable', 'none', 'None', ''] %}\n  n/d\n{%
        else %}\n  {{ (v | float(0)) | round(1) }} %\n{% endif %}"
      previ_prod_jour: '{{ states(''input_number.mp2_memoire_estimation_production_jour'')
        | float(0) | round(2) }}'
      realise_prod_jour: '{{ states(''sensor.mp2_total_energie_produite_jour'') |
        float(0) | round(2) }}'
      ecart_prod_jour: "{{\n  (\n    states('sensor.mp2_total_energie_produite_jour')
        | float(0) -\n    states('input_number.mp2_memoire_estimation_production_jour')
        | float(0)\n  ) | round(2)\n}}"
      ecart_prod_jour_txt: "{% set e =\n  (\n    states('sensor.mp2_total_energie_produite_jour')
        | float(0) -\n    states('input_number.mp2_memoire_estimation_production_jour')
        | float(0)\n  ) | round(2)\n%} {{ '%+.2f' | format(e) }} kWh"
      ecart_prod_pct_txt: "{% set p = states('input_number.mp2_memoire_estimation_production_jour')
        | float(0) %} {% set r = states('sensor.mp2_total_energie_produite_jour')
        | float(0) %} {% if p > 0 %}\n  {{ '%+.1f' | format(((r - p) / p * 100) |
        round(1)) }} %\n{% else %}\n  n/d\n{% endif %}"
      previ_conso_6_22: '{{ states(''sensor.mp2_dess_previ_conso_6_22_j1'') | float(0)
        | round(2) }}'
      realise_conso_6_22: '{{ states(''sensor.comptage_energie_conso_maison_6_22_jour_6_22'')
        | float(0) | round(2) }}'
      ecart_conso_6_22: "{{\n  (\n    states('sensor.comptage_energie_conso_maison_6_22_jour_6_22')
        | float(0) -\n    states('sensor.mp2_dess_previ_conso_6_22_j1') | float(0)\n
        \ ) | round(2)\n}}"
      ecart_conso_6_22_txt: "{% set e =\n  (\n    states('sensor.comptage_energie_conso_maison_6_22_jour_6_22')
        | float(0) -\n    states('sensor.mp2_dess_previ_conso_6_22_j1') | float(0)\n
        \ ) | round(2)\n%} {{ '%+.2f' | format(e) }} kWh"
      ecart_conso_6_22_pct_txt: "{% set p = states('sensor.mp2_dess_previ_conso_6_22_j1')
        | float(0) %} {% set r = states('sensor.comptage_energie_conso_maison_6_22_jour_6_22')
        | float(0) %} {% if p > 0 %}\n  {{ '%+.1f' | format(((r - p) / p * 100) |
        round(1)) }} %\n{% else %}\n  n/d\n{% endif %}"
  - action: ai_task.generate_data
    continue_on_error: true
    response_variable: recap_energie
    data:
      task_name: recap energie journalier complet
      entity_id: ai_task.google_ai_task
      instructions: 'Tu es un assistant énergie domestique.

        Rédige un message Telegram en français, factuel, compact et utile. N''invente
        aucune donnée. Si une donnée vaut "n/d", indique simplement qu''elle n''est
        pas disponible. 8 lignes maximum. Commence par un emoji.

        Mets en avant : - la consommation totale du jour, - la répartition heures
        creuses / heures pleines, - le poste Tempo dominant, - le coût du jour si
        disponible, - la production PV si disponible, - l''import/export réseau si
        disponibles, - la batterie si disponible, - une analyse très courte du prévu/réalisé
        production, - une analyse très courte du prévu/réalisé consommation 6-22h,
        - un conseil très court pour demain selon la couleur Tempo.

        Pour l''analyse prévu/réalisé : - indique clairement si le réalisé est au-dessus,
        en dessous ou conforme à la prévision, - utilise les écarts fournis, - reste
        synthétique.

        Données du jour : - Date : {{ date_jour }} - Consommation totale : {{ conso_totale
        }} kWh - Total HC : {{ total_hc }} kWh - Total HP : {{ total_hp }} kWh - Bleu
        HC : {{ bleu_hc }} kWh - Bleu HP : {{ bleu_hp }} kWh - Blanc HC : {{ blanc_hc
        }} kWh - Blanc HP : {{ blanc_hp }} kWh - Rouge HC : {{ rouge_hc }} kWh - Rouge
        HP : {{ rouge_hp }} kWh - Poste dominant : {{ poste_dominant }} - Coût du
        jour : {{ cout_jour_txt }} - Production PV : {{ pv_jour_txt }} - Import réseau
        : {{ import_reseau_txt }} - Export réseau : {{ export_reseau_txt }} - Batterie
        mini du jour : {{ bat_min_txt }} - Batterie maxi du jour : {{ bat_max_txt
        }} - SOC actuel/soir : {{ soc_soir_txt }} - Couleur Tempo demain : {{ couleur_demain
        }}

        Analyse prévision / réalisé production : - Prévision production jour : {{
        previ_prod_jour }} kWh - Réalisé production jour : {{ realise_prod_jour }}
        kWh - Ecart production : {{ ecart_prod_jour_txt }} - Ecart production % :
        {{ ecart_prod_pct_txt }}

        Analyse prévision / réalisé consommation 6-22h : - Prévision consommation
        6-22h : {{ previ_conso_6_22 }} kWh - Réalisé consommation 6-22h : {{ realise_conso_6_22
        }} kWh - Ecart consommation 6-22h : {{ ecart_conso_6_22_txt }} - Ecart consommation
        6-22h % : {{ ecart_conso_6_22_pct_txt }}'
      structure:
        titre:
          description: Titre très court du message Telegram
          required: true
          selector:
            text:
