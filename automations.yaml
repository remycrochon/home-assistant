- id: '1774028162818'
  alias: Volet Chambre Parents - V3 été heure réglable
  description: 'Journée : suivi solaire V2 entre l''heure d''ouverture réglable et
    sunset. Soir : fermeture automatique à sunset + 30 min. Matin : ouverture automatique
    à l''heure définie par helper.

    '
  triggers:
  - trigger: homeassistant
    event: start
    id: start
  - trigger: time_pattern
    minutes: /10
    id: periodic
  - trigger: state
    entity_id:
    - input_select.mode_volets_chamb_parents
    - input_datetime.heure_ouverture_volet_parents
    - input_number.orientation_volets_parents
    - input_number.angle_exposition_volet_parent
    - input_number.elevation_mini_volet_parents
    - input_number.radiation_seuil_volets
    - input_number.seuil_temperature_volets
    id: params
  - trigger: time
    at: input_datetime.heure_ouverture_volet_parents
    id: morning_open
  - trigger: sun
    event: sunset
    offset: 00:30:00
    id: sunset_close
  conditions:
  - condition: state
    entity_id: input_select.mode_volets_chamb_parents
    state: Auto Pos Soleil
  actions:
  - variables:
      morning_open_time: '{{ states(''input_datetime.heure_ouverture_volet_parents'')
        }}'
      orientation: '{{ states(''input_number.orientation_volets_parents'') | float(0)
        }}'
      angle: '{{ states(''input_number.angle_exposition_volet_parent'') | float(0)
        }}'
      elevation_min: '{{ states(''input_number.elevation_mini_volet_parents'') | float(0)
        }}'
      azimuth: '{{ state_attr(''sun.sun'', ''azimuth'') | float(0) }}'
      elevation: '{{ state_attr(''sun.sun'', ''elevation'') | float(-90) }}'
      gamma: '{{ (((orientation - azimuth + 180) % 360) - 180) | float(0) }}'
      gamma_abs: '{{ (gamma | float(0)) | abs }}'
      radiation: '{{ states(''sensor.vp2_radiation_moyenne'') | float(0) }}'
      radiation_threshold: '{{ states(''input_number.radiation_seuil_volets'') | float(0)
        }}'
      temperature: '{{ states(''sensor.vp2_temp_out'') | float(0) }}'
      temperature_threshold: '{{ states(''input_number.seuil_temperature_volets'')
        | float(30) }}'
      meteo_ok: '{{ states(''weather.albi'') in [''sunny'', ''partlycloudy''] }}'
      azimuth_ok: '{{ gamma_abs | float(999) <= angle | float(0) }}'
      elevation_ok: '{{ elevation | float(-90) > elevation_min | float(0) }}'
      radiation_ok: '{{ radiation | float(0) > radiation_threshold | float(0) }}'
      temp_hot: '{{ temperature | float(0) > temperature_threshold | float(30) }}'
      elev_span: '{% set v = 65 - (elevation_min | float(0)) %} {{ [v, 1] | max }}'
      coef_elev: '{% set v = ((elevation | float(0)) - (elevation_min | float(0)))
        / (elev_span | float(1)) %} {{ [[v, 0] | max, 1] | min }}'
      angle_safe: '{{ [angle | float(0), 1] | max }}'
      coef_azi: '{% set v = 1 - ((gamma_abs | float(0)) / (angle_safe | float(1)))
        %} {{ [[v, 0] | max, 1] | min }}'
      coef_mix: '{{ ((coef_elev | float(0)) * 0.70 + (coef_azi | float(0)) * 0.30)
        }}'
      progressive_pos: '{% set pos = 100 - ((coef_mix | float(0)) * 85) %} {{ [[pos,
        15] | max, 100] | min | round(0) }}'
      current_pos: "{# A ADAPTER POUR UNE AUTRE PIECE : capteur de position + cover
        #} {% set s = states('sensor.position_petit_volet_ch_parents') %} {% if s
        not in ['unknown', 'unavailable', 'none', ''] %}\n  {{ s | int(100) }}\n{%
        else %}\n  {{ state_attr('cover.volet_ch_parts_petit', 'current_position')
        | int(100) }}\n{% endif %}"
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ trigger.id == ''morning_open'' }}'
      sequence:
      - variables:
          target_pos: 100
          reason: ouverture programmée à l'heure réglable
          delta_pos: '{{ ((current_pos | int(100)) - 100) | abs }}'
      - action: input_text.set_value
        target:
          entity_id: input_text.debug_volet_parent
        data:
          value: 'Trigger={{ trigger.id }}

            Heure ouverture={{ morning_open_time[:5] }}

            Cible={{ target_pos }}

            Actuelle={{ current_pos }}

            Delta={{ delta_pos }}

            Gamma={{ gamma | round(1) }}

            Azimut={{ azimuth | round(1) }}

            Élévation={{ elevation | round(1) }}

            Radiation={{ radiation | round(0) }} (seuil={{radiation_threshold }})

            Temp={{ temperature | round(1) }} (seuil={{temperature_threshold }})

            Azimuth_OK={{ azimuth_ok }}

            Elevation_OK={{ elevation_ok }}

            Meteo_OK={{ meteo_ok }}

            Raison={{ reason }}'
      - if:
        - condition: template
          value_template: '{{ delta_pos | int(0) >= 5 }}'
        then:
        - action: cover.set_cover_position
          target:
            entity_id: cover.volet_ch_parts_petit
          data:
            position: 100
    - conditions:
      - condition: template
        value_template: '{{ trigger.id == ''sunset_close'' }}'
      sequence:
      - variables:
          target_pos: 0
          reason: fermeture programmée à sunset + 30 min
          delta_pos: '{{ (current_pos | int(100)) | abs }}'
      - action: input_text.set_value
        target:
          entity_id: input_text.debug_volet_parent
        data:
          value: 'Trigger={{ trigger.id }}

            Heure ouverture={{ morning_open_time[:5] }}

            Cible={{ target_pos }}

            Actuelle={{ current_pos }}

            Delta={{ delta_pos }}

            Gamma={{ gamma | round(1) }}

            Azimut={{ azimuth | round(1) }}

            Élévation={{ elevation | round(1) }}

            Radiation={{ radiation | round(0) }} (seuil={{radiation_threshold }})

            Temp={{ temperature | round(1) }} (seuil={{temperature_threshold }})

            Azimuth_OK={{ azimuth_ok }}

            Elevation_OK={{ elevation_ok }}

            Meteo_OK={{ meteo_ok }}

            Raison={{ reason }}'
      - if:
        - condition: template
          value_template: '{{ delta_pos | int(0) >= 5 }}'
        then:
        - action: cover.set_cover_position
          target:
            entity_id: cover.volet_ch_parts_petit
          data:
            position: 0
    - conditions:
      - condition: template
        value_template: '{{ trigger.id in [''start'', ''periodic'', ''params''] }}'
      - condition: template
        value_template: '{{ now() >= today_at(states(''input_datetime.heure_ouverture_volet_parents''))
          }}

          '
      - condition: sun
        before: sunset
      sequence:
      - variables:
          target_pos: "{% if azimuth_ok and elevation_ok and temp_hot %}\n  0\n{%
            elif azimuth_ok and elevation_ok and radiation_ok and meteo_ok %}\n  {{
            progressive_pos }}\n{% else %}\n  100\n{% endif %}"
          reason: "{% if azimuth_ok and elevation_ok and temp_hot %}\n  façade exposée
