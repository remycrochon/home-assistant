- id: '1774291163691'
  alias: Volet Automatisme Général RTS V2
  description: Ete -> ouvre et ferme sur horaire Hiver -> ouvre sur horaire et ferme
    sur transition jour/nuit Absent -> ouvre et ferme sur transitions jour/nuit
  triggers:
  - trigger: homeassistant
    event: start
    id: ha_start
  - trigger: template
    id: jour_vers_nuit
    value_template: "{{ states('sensor.bh1750_illuminance') | float(0)\n   < states('input_number.luminosite_seuil_bas')
