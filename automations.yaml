        }} min\n{% endif %}"
  - action: ai_task.generate_data
    continue_on_error: true
    response_variable: rapport_dess_ia
    data:
      task_name: rapport dess 22h
      entity_id: ai_task.google_ai_task
      instructions: 'Tu es un assistant énergie domestique.

        Rédige un message Telegram en français. Sois factuel, compact et utile. N''invente
        aucune donnée. 6 lignes maximum. Commence par un emoji.

        Analyse uniquement la situation DESS à 22:00.

        Tu dois : - indiquer si le forçage DESS est actif ou non, - si le forçage
        est actif, mentionner le niveau de forçage demandé, - comparer le SOC actuel
        au SOC cible, - si le forçage est actif, comparer aussi le SOC actuel au niveau
        de forçage, - rappeler la prévision de production demain, - estimer le SOC
        à 05:45 sans charge en tenant compte d''une baisse nocturne historique, -
        indiquer l''heure prévisionnelle de début de charge pour finir à 05:45, -
        préciser que cette estimation repose sur une baisse nocturne moyenne de 27
        %, - conclure par une remarque très courte sur la cohérence de la situation.

        Données : - Horodatage : {{ date_snapshot }} - Prévision production demain
        : {{ previ_prod_demain }} kWh - Forçage DESS : {{ forcage_actif_txt }} - Forçage
        DESS (0/1) : {{ forcage_actif_num }} - Niveau de forçage demandé : {{ niveau_forcage
        }} - SOC cible : {{ soc_cible }} % - SOC actuel : {{ soc_actuel }} % - Ecart
        SOC actuel - SOC cible : {{ ecart_soc_cible_txt }} - Ecart SOC actuel - niveau
        de forçage : {{ ecart_soc_forcage_txt }} - Baisse nocturne historique estimée
        22:00->05:45 : {{ perte_nuit_estimee_pct }} % - SOC prévu à 05:45 sans charge
        : {{ soc_prevu_0545_sans_charge }} % - Besoin corrigé de charge : {{ besoin_corrige_pct_txt
        }} % - Heure prévisionnelle de début de charge : {{ heure_debut_charge_previ_txt
        }} - Heure prévisionnelle de fin de charge : {{ heure_fin_charge_txt }} -
        Durée prévisionnelle de charge : {{ duree_charge_previ_min_txt }} min - Synthèse
        prévisionnelle : {{ synthese_charge_previ_txt }}'
  - choose:
    - conditions:
      - condition: template
        value_template: "{{\n  rapport_dess_ia is defined and\n  rapport_dess_ia.data
          is defined and\n  (rapport_dess_ia.data | string | trim | length) > 0\n}}"
      sequence:
      - action: telegram_bot.send_message
