            Azimut={{ azimuth | round(1) }}

            Élévation={{ elevation | round(1) }}

            Radiation={{ radiation | round(0) }} (seuil={{radiation_threshold }})

            Temp={{ temperature | round(1) }} (seuil={{temperature_threshold }})

            Azimuth_OK={{ azimuth_ok }}

            Elevation_OK={{ elevation_ok }}

            Meteo_OK={{ meteo_ok }}

            Raison={{ reason }}'
      - if:
        - condition: template
          value_template: '{{ delta_pos | int(0) >= 5 }}'
        then:
        - action: cover.set_cover_position
          target:
            entity_id: cover.volet_ch_sud
          data:
            position: 0
    - conditions:
      - condition: template
        value_template: '{{ trigger.id in [''start'', ''periodic'', ''params''] }}'
      - condition: template
        value_template: '{{ now() >= today_at(states(''input_datetime.heure_ouverture_volet_sud''))
          }}

          '
      - condition: sun
        before: sunset
      sequence:
      - variables:
          target_pos: "{% if azimuth_ok and elevation_ok and temp_hot %}\n  0\n{%
            elif azimuth_ok and elevation_ok and radiation_ok and meteo_ok %}\n  {{
            progressive_pos }}\n{% else %}\n  100\n{% endif %}"
          reason: "{% if azimuth_ok and elevation_ok and temp_hot %}\n  façade exposée
            + chaleur => fermeture totale\n{% elif azimuth_ok and elevation_ok and
            radiation_ok and meteo_ok %}\n  façade exposée + soleil utile => fermeture
            progressive\n{% elif not azimuth_ok %}\n  soleil hors façade => ouverture\n{%
            elif not elevation_ok %}\n  élévation insuffisante => ouverture\n{% elif
            not radiation_ok %}\n  radiation insuffisante => ouverture\n{% elif not
            meteo_ok %}\n  météo peu favorable => ouverture\n{% else %}\n  ouverture
            par défaut\n{% endif %}"
          delta_pos: '{{ ((current_pos | int(100)) - (target_pos | int(100))) | abs
            }}'
      - action: input_text.set_value
        target:
          entity_id: input_text.debug_volet_ch_sud
        data:
          value: 'Trigger={{ trigger.id }}

            Heure ouverture={{ morning_open_time[:5] }}

            Cible={{ target_pos }}

            Actuelle={{ current_pos }}

            Delta={{ delta_pos }}

            Gamma={{ gamma | round(1) }}

            Azimut={{ azimuth | round(1) }}

            Élévation={{ elevation | round(1) }}

            Radiation={{ radiation | round(0) }} (seuil={{radiation_threshold }})

            Temp={{ temperature | round(1) }} (seuil={{temperature_threshold }})

            Azimuth_OK={{ azimuth_ok }}

            Elevation_OK={{ elevation_ok }}

            Meteo_OK={{ meteo_ok }}

