        = 40 %} {% set abs_min_default = 60 %} {% set min_win = 15 %} {% set max_win
        = 8 * 60 %} {% set cible = states('sensor.mp2_dess_cible_soc_par_mqtt') |
        float(0) %} {% set soc = states('sensor.victron_mqtt_c0619ab1db0d_system_0_system_dc_battery_soc')
        | float(0) %} {% set perte = 27 %} {% set soc_fin = [soc - perte, 0] | max
        %} {% set need_pct = [cible - soc_fin, 0] | max %} {% if need_pct <= 0 %}\n
        \ n/d\n{% else %}\n  {% set ah_needed = (need_pct / 100) * cap_ah %}\n  {%
