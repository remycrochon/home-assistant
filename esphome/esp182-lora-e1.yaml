# Pour memoire:
#   - Conso au boot: ~ 105mA
#   - Conso sans WiFi: ~40 mA
#   - Conso en veille: 4.1 mA

substitutions:
  name_e1: esp182lorae1
  name_hub: esp181lorahub
  adress_ip: 192.168.0.182

  # Sommeil normal : 15 min
  duree_sommeil: "600s"

  # Butée max d'éveil.
  # L'ESP se rendormira avant via deep_sleep.enter si tout se passe bien.
  duree_reveil: "20s"
  # Mode actif / WiFi / test : fréquence d'émission LoRa
  # Mets 15s ou 30s pour tester, 60s ensuite.
  periode_emission_wifi: "15s"
  
esphome:
  name: ${name_e1}

  # Exécuté quand tout est initialisé.
  # Ancienne valeur 800 = trop tôt pour Dallas / Packet Transport.
  on_boot:
    priority: -100
    then:
      - delay: 2s
      - script.execute: maj_data

  on_shutdown:
    then:
      - switch.turn_off: led
      - sx127x.set_mode_sleep

esp32:
  board: esp32-c3-devkitm-1
  cpu_frequency: 160MHZ
  framework:
    type: esp-idf

logger:
  hardware_uart: UART0
  level: INFO

api:

ota:
  - platform: esphome

captive_portal:

wifi:
  networks:
    - ssid: !secret wifi_esp
      password: !secret mdpwifi_esp
  reboot_timeout: 5min
  min_auth_mode: WPA2
  manual_ip:
    static_ip: ${adress_ip}
    gateway: 192.168.0.254
    subnet: 255.255.255.0
    dns1: !secret dns1
    dns2: !secret dns2

web_server:
  port: 80

spi:
  clk_pin: GPIO04
  mosi_pin: GPIO06
  miso_pin: GPIO01

sx127x:
  data_rate: 1Mhz
  dio0_pin: GPIO05
  cs_pin: GPIO07
  rst_pin: GPIO03
  pa_pin: BOOST
  pa_power: 8
  bandwidth: 125_0kHz
  crc_enable: true
  frequency: 433920000
  modulation: LORA
  rx_start: true
  sync_value: 0x12
  spreading_factor: 7
  preamble_size: 8
  coding_rate: CR_4_6

packet_transport:
  platform: sx127x
  id: pt

  # Important : pas d'envoi périodique automatique.
  # On force l'envoi uniquement après lecture capteur valide.
  update_interval: never

  encryption: !secret encryption_key
  rolling_code_enable: false

  sensors:
    - id: ${name_e1}_temperature
    - id: ${name_e1}_compteur

one_wire:
  - platform: gpio
    pin: GPIO09
    id: ow1

globals:
  - id: compteur
    type: int
    restore_value: yes
    initial_value: '0'

sensor:
  - platform: dallas_temp
    name: ${name_e1}_temperature_raw
    id: temp_dallas_raw
    internal: true
    accuracy_decimals: 2
    update_interval: never
    filters:
      - filter_out: nan

  - platform: template
    name: ${name_e1}_temperature
    id: ${name_e1}_temperature
    device_class: temperature
    unit_of_measurement: "°C"
    state_class: measurement
    accuracy_decimals: 2
    update_interval: never

  - platform: template
    name: ${name_e1}_compteur
    id: ${name_e1}_compteur
    unit_of_measurement: "count"
    accuracy_decimals: 0
    update_interval: never
    
binary_sensor:
  - platform: gpio
    name: Sleep Ent
    pin:
      number: GPIO0
      inverted: true
      mode:
        input: true
        pullup: true
    id: sleep_ent
    internal: false
    filters:
      - delayed_on: 500ms
      - delayed_off: 500ms
switch:
  - platform: gpio
    id: led
    name: led
    pin:
      number: GPIO20
      inverted: false
    restore_mode: ALWAYS_OFF

  - platform: restart
    name: "Restart"

deep_sleep:
  id: sleep_xmin
  run_duration: ${duree_reveil}
  sleep_duration: ${duree_sommeil}

# Intervalle uniquement pour le mode normal/test.
# En mode sleep, seul on_boot déclenche l'envoi.
interval:
  - interval: ${periode_emission_wifi}
    then:
      - if:
          condition:
            binary_sensor.is_off: sleep_ent
          then:
            - script.execute: maj_data

script:
  # Mode sleep si Sleep Ent = ON.
  # Mode actif/test si Sleep Ent = OFF.
  - id: maj_data
    mode: single
    then:
      - delay: 1s

      - if:
          condition:
            binary_sensor.is_on: sleep_ent

          # ======================================================
          # MODE SLEEP
          # ======================================================
          then:
            - logger.log: "Mode sleep: WiFi OFF, lecture capteur, envoi LoRa puis sommeil"

            - switch.turn_on: led
            - delay: 200ms
            - switch.turn_off: led

            - wifi.disable

            - script.execute: lecture_capteur

            # Petite marge pour finir l'envoi LoRa avant sommeil.
            - delay: 2s

            - deep_sleep.enter: sleep_xmin

          # ======================================================
          # MODE NORMAL / TEST
          # ======================================================
          else:
            - logger.log: "Mode actif: WiFi actif, deep sleep bloque, envoi LoRa toutes les 60s"

            - deep_sleep.prevent: sleep_xmin
            - wifi.enable

            - switch.turn_on: led
            - delay: 200ms
            - switch.turn_off: led

            - script.execute: lecture_capteur

  # Lecture DS18B20 puis envoi LoRa.
  - id: lecture_capteur
    mode: single
    then:
      - logger.log: "Lecture DS18B20 demandee"

      # Lance la conversion Dallas brute, non envoyée directement en LoRa
      - component.update: temp_dallas_raw

      # Attente DS18B20
      - delay: 1500ms

      - if:
          condition:
            lambda: |-
              return !isnan(id(temp_dallas_raw).state);

          then:
            - lambda: |-
                id(compteur) = (id(compteur) + 1) % 100;

                // Publication des deux capteurs LoRa dans la même lambda.
                // Ainsi packet_transport les voit valides ensemble.
                id(${name_e1}_temperature).publish_state(id(temp_dallas_raw).state);
                id(${name_e1}_compteur).publish_state(id(compteur));

                ESP_LOGI(
                  "LORA_E1",
                  "Mesure LoRa valide: temp=%.2f °C, compteur=%d",
                  id(temp_dallas_raw).state,
                  id(compteur)
                );

            # Laisse packet_transport envoyer la trame déclenchée par les publish_state
            - delay: 1500ms

            # Optionnel : force une trame complète finale.
            # Tu peux le laisser au début du test, puis le supprimer si tu veux moins de paquets.
            - component.update: pt

            - delay: 1500ms

            - logger.log: "Trame LoRa E1 envoyee"

          else:
            - logger.log: "DS18B20 invalide / nan: pas d'envoi LoRa"