esphome:
  on_boot:
    priority: -100
    then:
      - lambda: |-
          id(etat_appoint_eau).publish_state("Initialisation");
          id(securite_appoint_eau).publish_state("Initialisation");
      - delay: 10s
      - script.execute: _calcul_niveau_eau
      - delay: 500ms
      - script.execute: _securite_appoint_eau


# Déclenchement du script regul_eau sur BP
# Arrêt vanne eau si niveau haut ou défaut
#
# Logique retenue après test terrain :
# id(lsh) = 1 => LSH recouvert / dans l'eau
# id(lsh) = 0 => LSH découvert
# id(lsl) = 1 => LSL recouvert / dans l'eau
# id(lsl) = 0 => LSL découvert
#
# Table niveau :
# LSH = 0 et LSL = 0 => Niveau bas
# LSH = 0 et LSL = 1 => Niveau intermédiaire
# LSH = 1 et LSL = 1 => Niveau haut
# LSH = 1 et LSL = 0 => Défaut incohérent

globals:
  - id: ev_eau_on_start_time
    type: uint32_t
    restore_value: no
    initial_value: '0'

  - id: ev_eau_start_lsl_state
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: ev_eau_start_lsh_state
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: ev_eau_secu_niveau_declenchee
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: ev_eau_arret_securite
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: appoint_eau_auto_2_last_yday
    type: int
    restore_value: no
    initial_value: '-1'

datetime:
  - platform: template
    name: "Heure Appoint Eau Auto 2"
    id: heure_appoint_eau_auto_2
    type: time
    icon: mdi:clock-time-five-outline
    optimistic: true
    restore_value: true
    initial_value: "17:00:00"

number:
  - platform: template
    name: "Tempo Secu Niveau Appoint Eau"
    id: tempo_secu_niveau_appoint_eau
    unit_of_measurement: "min"
    min_value: 5
    max_value: 60
    step: 1
    optimistic: true
    restore_value: true
    initial_value: 15
    mode: box

  - platform: template
    name: "Duree Maxi EV Eau"
    id: duree_maxi_ev_eau
    unit_of_measurement: "min"
    min_value: 15
    max_value: 180
    step: 5
    optimistic: true
    restore_value: true
    initial_value: 60
    mode: box

select:
  - platform: template
    name: "Mode_Fonct_appoint_eau"
    optimistic: true
    restore_value: true
    options:
      - Auto
      - Ma_f
      - At_f
    id: _Mode_Fonctionnement_regul_eau
    on_value:
      then:
        - logger.log:
            format: "Mode Fonct Regul Eau --> %s"
            args: [ 'id(_Mode_Fonctionnement_regul_eau).current_option()' ]
            level: INFO
        - script.stop: _regul_eau
        - delay: 1s
        - script.execute: _calcul_niveau_eau
        - delay: 200ms
        - script.execute: _regul_eau


button:
  - platform: template
    name: "BP_Appoint Eau"
    on_press:
      - script.execute: _calcul_niveau_eau
      - delay: 200ms
      - script.execute: _regul_eau


text_sensor:
  - platform: template
    name: "Etat Appoint Eau"
    id: etat_appoint_eau
    icon: mdi:water-pump
    update_interval: never

  - platform: template
    name: "Securite Appoint Eau"
    id: securite_appoint_eau
    icon: mdi:shield-alert
    update_interval: never


binary_sensor:
  - platform: template
    name: "niv_haut"
    id: niv_haut
    filters:
      - delayed_on: 5s
    on_press:
      then:
        - lambda: |-
            ESP_LOGI("EV_EAU", "Niveau haut atteint");

            if (id(cde_ev_eau).state) {
              std::string mess = "ESP178 Appoint Eau->Niveau haut atteint, fermeture EV eau";

              id(ev_eau_arret_securite) = true;
              id(securite_appoint_eau).publish_state(mess);

              id(cde_ev_eau).turn_off();
              id(_regul_eau).stop();

              id(_message_telegram)->execute(mess, 0);
              id(_log_fichier)->execute(mess, 0);
            }

  - platform: template
    name: "niv_inter"
    id: niv_inter

  - platform: template
    name: "niv_bas"
    id: niv_bas

  - platform: template
    name: "niv_defaut"
    id: niv_defaut
    filters:
      - delayed_on: 5s
    on_press:
      then:
        - lambda: |-
            ESP_LOGW("EV_EAU", "Defaut niveau eau : LSH=1 et LSL=0");

            if (id(cde_ev_eau).state) {
              std::string mess = "ESP178 Defaut Appoint Eau->Etat sondes incoherent LSH=1 LSL=0, fermeture EV eau";

              id(ev_eau_arret_securite) = true;
              id(securite_appoint_eau).publish_state(mess);

              id(cde_ev_eau).turn_off();
              id(_regul_eau).stop();

              id(_message_telegram)->execute(mess, 0);
              id(_log_fichier)->execute(mess, 0);
            }

  # GPIO sur module extension SX1509
  #
  # On conserve inverted: true.
  # Avec ton câblage actuel :
  # id(lsh) = 1 => LSH recouvert / dans l'eau
  # id(lsl) = 1 => LSL recouvert / dans l'eau

  - platform: gpio
    name: "tp_plein_lsh"
    id: lsh
    pin:
      sx1509: sx1509_hub1
      number: 1
      mode:
        input: true
        pullup: false
      inverted: true
    filters:
      - delayed_on_off: 5s
    on_state:
      then:
        - script.execute: _calcul_niveau_eau

  - platform: gpio
    name: "tp_plein_lsl"
    id: lsl
    pin:
      sx1509: sx1509_hub1
      number: 2
      mode:
        input: true
        pullup: false
      inverted: true
    filters:
      - delayed_on_off: 5s
    on_state:
      then:
        - script.execute: _calcul_niveau_eau


sensor:
  - platform: duty_time
    id: _temps_fonctionnement_ev_eau
    name: "temps_ma_ev_eau"
    lambda: "return id(cde_ev_eau).state == true;"
    restore: true
    filters:
      - round: 0


switch:
  - platform: gpio
    name: "cde_ev_eau"
    pin: ${GPIO_rel_ev_eau}
    id: cde_ev_eau

    on_turn_on:
      - script.execute: _calcul_niveau_eau
      - delay: 200ms
      - lambda: |-
          bool lsh_eau = id(lsh).state;
          bool lsl_eau = id(lsl).state;

          bool niveau_haut = lsh_eau && lsl_eau;
          bool niveau_defaut = lsh_eau && !lsl_eau;

          if (niveau_defaut) {
            std::string mess = "ESP178 Defaut Appoint Eau->Ouverture EV interdite : sondes incoherentes LSH=1 LSL=0";

            id(ev_eau_arret_securite) = true;
            id(securite_appoint_eau).publish_state(mess);

            id(cde_ev_eau).turn_off();
            id(_regul_eau).stop();

            id(_message_telegram)->execute(mess, 0);
            id(_log_fichier)->execute(mess, 0);
            return;
          }

          if (niveau_haut) {
            std::string mess = "ESP178 Appoint Eau->Ouverture EV interdite : niveau haut deja atteint";

            id(ev_eau_arret_securite) = true;
            id(securite_appoint_eau).publish_state(mess);

            id(cde_ev_eau).turn_off();
            id(_regul_eau).stop();

            id(_message_telegram)->execute(mess, 0);
            id(_log_fichier)->execute(mess, 0);
            return;
          }

          id(ev_eau_on_start_time) = millis() / 1000;

          id(ev_eau_start_lsl_state) = id(lsl).state;
          id(ev_eau_start_lsh_state) = id(lsh).state;

          id(ev_eau_secu_niveau_declenchee) = false;
          id(ev_eau_arret_securite) = false;

          id(etat_appoint_eau).publish_state("EV eau ouverte - remplissage en cours");
          id(securite_appoint_eau).publish_state("Surveillance active");

          ESP_LOGI("EV_EAU",
                   "Vanne ouverte. Start=%u s, LSH=%d, LSL=%d",
                   id(ev_eau_on_start_time),
                   id(ev_eau_start_lsh_state),
                   id(ev_eau_start_lsl_state));

    on_turn_off:
      - lambda: |-
          id(ev_eau_on_start_time) = 0;
          id(ev_eau_start_lsl_state) = false;
          id(ev_eau_start_lsh_state) = false;
          id(ev_eau_secu_niveau_declenchee) = false;

          id(etat_appoint_eau).publish_state("EV eau fermee");

          if (!id(ev_eau_arret_securite)) {
            id(securite_appoint_eau).publish_state("OK - EV fermee");
          } else {
            id(ev_eau_arret_securite) = false;
          }

          ESP_LOGI("EV_EAU", "Vanne fermee, temps reinitialise");


interval:
  - interval: 60s
    then:
      - script.execute: _calcul_niveau_eau

  - interval: 60s
    then:
      - lambda: |-
          auto now = id(sntp_time).now();
          if (now.hour == 0 && now.minute == 0) {
            id(_temps_fonctionnement_ev_eau).reset();
          }

  - interval: 60s
    then:
      - script.execute: _securite_appoint_eau

  - interval: 30s
    then:
      - if:
          condition:
            lambda: |-
              auto now = id(sntp_time).now();

              if (!now.is_valid()) {
                return false;
              }

              int h = id(heure_appoint_eau_auto_2).hour;
              int m = id(heure_appoint_eau_auto_2).minute;
              int s = id(heure_appoint_eau_auto_2).second;

              int now_s = now.hour * 3600 + now.minute * 60 + now.second;
              int target_s = h * 3600 + m * 60 + s;

              // Fenetre de 90 secondes pour ne pas rater le declenchement.
              // Protection par jour pour eviter plusieurs lancements.
              if (now_s >= target_s &&
                  now_s < target_s + 90 &&
                  id(appoint_eau_auto_2_last_yday) != now.day_of_year) {

                id(appoint_eau_auto_2_last_yday) = now.day_of_year;
                return true;
              }

              return false;

          then:
            - script.execute: _appoint_eau_auto_2

script:
  - id: _regul_eau
    mode: single
    then:
      - script.execute: _calcul_niveau_eau
      - delay: 200ms

      # Mode Auto
      - if:
          condition:
            lambda: 'return id(_Mode_Fonctionnement_regul_eau).current_option() == "Auto";'
          then:
            - if:
                condition:
                  and:
                    - binary_sensor.is_off: niv_defaut
                    - binary_sensor.is_off: niv_haut
                    - binary_sensor.is_on: volet_ouvert
                then:
                  - lambda: |-
                      if (!id(cde_ev_eau).state) {
                        ESP_LOGI("EV_EAU", "Ouverture vanne eau Mode Auto : conditions OK");
                        id(cde_ev_eau).turn_on();

                        std::string mess = "ESP178 Appoint Eau->Ouverture EV eau Mode Auto";
                        id(_log_fichier)->execute(mess, 0);
                      } else {
                        ESP_LOGI("EV_EAU", "EV eau deja ouverte");
                      }

                else:
                  - lambda: |-
                      ESP_LOGI("EV_EAU",
                               "Ouverture EV eau refusee : defaut=%d haut=%d volet_ouvert=%d",
                               id(niv_defaut).state,
                               id(niv_haut).state,
                               id(volet_ouvert).state);

                      id(securite_appoint_eau).publish_state("Ouverture refusee - conditions non remplies");

                  - switch.turn_off: cde_ev_eau
                  
  - id: _appoint_eau_auto_2
    mode: single
    then:
      - script.execute: _calcul_niveau_eau
      - delay: 200ms

      - if:
          condition:
            and:
              - lambda: 'return id(_Mode_Fonctionnement_regul_eau).current_option() == "Auto";'
              - binary_sensor.is_on: volet_ouvert
              - binary_sensor.is_off: niv_defaut
              - binary_sensor.is_off: niv_haut

          then:
            - lambda: |-
                std::string mess = "ESP178 Appoint Eau->Declenchement appoint auto 2 : mode Auto, volet ouvert, conditions OK";

                ESP_LOGI("EV_EAU", "%s", mess.c_str());

                id(securite_appoint_eau).publish_state("Appoint auto 2 - conditions OK");
                id(_log_fichier)->execute(mess, 0);

            - script.execute: _regul_eau

          else:
            - lambda: |-
                std::string mode = id(_Mode_Fonctionnement_regul_eau).current_option();

                std::string mess = "ESP178 Appoint Eau->Appoint auto 2 ignore : mode=" +
                                   mode +
                                   " volet_ouvert=" +
                                   std::to_string(id(volet_ouvert).state) +
                                   " niv_haut=" +
                                   std::to_string(id(niv_haut).state) +
                                   " niv_defaut=" +
                                   std::to_string(id(niv_defaut).state);

                ESP_LOGI("EV_EAU", "%s", mess.c_str());

                id(securite_appoint_eau).publish_state("Appoint auto 2 ignore - conditions non remplies");
                id(_log_fichier)->execute(mess, 0);

      # Mode marche forcée
      # Les sécurités restent actives.
      - if:
          condition:
            lambda: 'return id(_Mode_Fonctionnement_regul_eau).current_option() == "Ma_f";'
          then:
            - logger.log:
                format: "Ouverture vanne eau Mode Ma Force"
                level: DEBUG
            - switch.turn_on: cde_ev_eau

      # Mode arrêt forcé
      - if:
          condition:
            lambda: 'return id(_Mode_Fonctionnement_regul_eau).current_option() == "At_f";'
          then:
            - logger.log:
                format: "Fermeture vanne eau Mode At Force"
                level: DEBUG
            - switch.turn_off: cde_ev_eau
  - id: _regul_eau_old
    mode: single
    then:
      - script.execute: _calcul_niveau_eau
      - delay: 200ms

      # Mode Auto
      - if:
          condition:
            lambda: 'return id(_Mode_Fonctionnement_regul_eau).current_option() == "Auto";'
          then:
            - if:
                condition:
                  and:
                    - binary_sensor.is_off: niv_defaut
                    - binary_sensor.is_off: niv_haut
                    - binary_sensor.is_on: volet_ouvert
                then:
                  - lambda: |-
                      uint32_t now = millis() / 1000;

                      if (id(volet_ferme_off_time) != 0 && (now - id(volet_ferme_off_time)) >= 240) {
                        if (!id(cde_ev_eau).state) {
                          ESP_LOGI("EV_EAU", "Ouverture vanne eau Mode Auto apres temporisation de 240s");
                          id(cde_ev_eau).turn_on();
                        }
                      } else {
                        ESP_LOGI("EV_EAU", "Tempo volet non terminee : ouverture EV eau interdite");
                      }

                else:
                  - logger.log:
                      format: "Conditions non remplies pour ouverture vanne eau Mode Auto"
                      level: INFO
                  - switch.turn_off: cde_ev_eau

      # Mode marche forcée
      # Les sécurités restent actives.
      - if:
          condition:
            lambda: 'return id(_Mode_Fonctionnement_regul_eau).current_option() == "Ma_f";'
          then:
            - logger.log:
                format: "Ouverture vanne eau Mode Ma Force"
                level: DEBUG
            - switch.turn_on: cde_ev_eau

      # Mode arrêt forcé
      - if:
          condition:
            lambda: 'return id(_Mode_Fonctionnement_regul_eau).current_option() == "At_f";'
          then:
            - logger.log:
                format: "Fermeture vanne eau Mode At Force"
                level: DEBUG
            - switch.turn_off: cde_ev_eau


  - id: _calcul_niveau_eau
    mode: single
    then:
      - lambda: |-
          // États directement exploitables :
          // true  = sonde recouverte / dans l'eau
          // false = sonde découverte
          bool lsh_eau = id(lsh).state;
          bool lsl_eau = id(lsl).state;

          bool niveau_haut =   lsh_eau &&  lsl_eau;
          bool niveau_inter = !lsh_eau &&  lsl_eau;
          bool niveau_bas =   !lsh_eau && !lsl_eau;
          bool niveau_defaut = lsh_eau && !lsl_eau;

          id(niv_haut).publish_state(niveau_haut);
          id(niv_inter).publish_state(niveau_inter);
          id(niv_bas).publish_state(niveau_bas);
          id(niv_defaut).publish_state(niveau_defaut);

          if (niveau_haut) {
            id(etat_appoint_eau).publish_state("Niveau haut");
          } else if (niveau_inter) {
            id(etat_appoint_eau).publish_state("Niveau intermediaire");
          } else if (niveau_bas) {
            id(etat_appoint_eau).publish_state("Niveau bas");
          } else if (niveau_defaut) {
            id(etat_appoint_eau).publish_state("Defaut sondes niveau");
          }

          ESP_LOGI("NIVEAU_EAU",
                   "LSH=%d LSL=%d => haut=%d inter=%d bas=%d defaut=%d",
                   lsh_eau,
                   lsl_eau,
                   niveau_haut,
                   niveau_inter,
                   niveau_bas,
                   niveau_defaut);


  - id: _securite_appoint_eau
    mode: single
    then:
      - lambda: |-
          if (!id(cde_ev_eau).state) {
            id(securite_appoint_eau).publish_state("OK - EV fermee");
            return;
          }

          bool lsh_eau = id(lsh).state;
          bool lsl_eau = id(lsl).state;

          bool niveau_haut =   lsh_eau &&  lsl_eau;
          bool niveau_bas =   !lsh_eau && !lsl_eau;
          bool niveau_defaut = lsh_eau && !lsl_eau;

          auto fermer_securite = [&](const std::string &mess, uint32_t duration) {
            ESP_LOGW("SECURITE_EAU", "%s", mess.c_str());

            id(ev_eau_arret_securite) = true;
            id(securite_appoint_eau).publish_state(mess);

            id(cde_ev_eau).turn_off();
            id(_regul_eau).stop();

            id(_message_telegram)->execute(mess, duration);
            id(_log_fichier)->execute(mess, duration);
          };

          if (id(ev_eau_on_start_time) == 0) {
            std::string mess = "ESP178 Defaut Appoint Eau->EV ouverte mais temps de depart non initialise, fermeture securite";
            fermer_securite(mess, 0);
            return;
          }

          uint32_t now = millis() / 1000;
          uint32_t duration = now - id(ev_eau_on_start_time);

          uint32_t tempo_niveau_s = (uint32_t)(id(tempo_secu_niveau_appoint_eau).state * 60.0f);
          uint32_t duree_max_s = (uint32_t)(id(duree_maxi_ev_eau).state * 60.0f);

          // Sécurité 1 : état incohérent
          // LSH dans l'eau alors que LSL est découvert.
          if (niveau_defaut) {
            std::string mess = "ESP178 Defaut Appoint Eau->Sondes incoherentes LSH=1 LSL=0 pendant remplissage, fermeture EV eau";
            fermer_securite(mess, duration);
            return;
          }

          // Sécurité 2 : niveau haut atteint
          // Active aussi en marche forcée.
          if (niveau_haut) {
            std::string mess = "ESP178 Appoint Eau->Niveau haut atteint, fermeture EV eau";
            fermer_securite(mess, duration);
            return;
          }

          // Sécurité 3 : EV ouverte mais LSL reste découvert trop longtemps
          // Cas typiques :
          // - capteur LSL HS ou débranché
          // - arrivée d'eau fermée
          // - niveau qui ne monte pas
          // - fuite
          //
          // Elle s'applique uniquement si on a démarré niveau bas,
          // donc avec LSL découvert au départ.
          if (!id(ev_eau_secu_niveau_declenchee) &&
              duration >= tempo_niveau_s &&
              id(ev_eau_start_lsl_state) == false &&
              lsl_eau == false &&
              niveau_bas) {

            id(ev_eau_secu_niveau_declenchee) = true;

            std::string mess = "ESP178 Defaut Appoint Eau->EV ouverte depuis " +
                               std::to_string(duration / 60) +
                               "min et LSL toujours decouvert. Niveau ne monte pas ou capteur/arrivee eau en defaut. Fermeture EV eau";

            fermer_securite(mess, duration);
            return;
          }

          // Sécurité 4 : durée maxi absolue d'ouverture
          if (duration >= duree_max_s) {
            std::string mess = "ESP178 Defaut Appoint Eau->Vanne eau ouverte depuis " +
                               std::to_string(duration / 3600) + "h " +
                               std::to_string((duration % 3600) / 60) + "min " +
                               std::to_string(duration % 60) +
                               "s, fermeture forcee";

            fermer_securite(mess, duration);
            return;
          }

          id(securite_appoint_eau).publish_state("Surveillance active");

          ESP_LOGI("SECURITE_EAU",
                   "Surveillance OK : EV ouverte depuis %u s | LSH=%d LSL=%d | bas=%d haut=%d defaut=%d",
                   duration,
                   lsh_eau,
                   lsl_eau,
                   niveau_bas,
                   niveau_haut,
                   niveau_defaut);