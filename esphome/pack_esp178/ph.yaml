globals:
  - id: g_memoire_ph
    type: float
    restore_value: yes
    initial_value: '7.2'

  - id: g_tps_injection_ph_moins
    type: float
    restore_value: no
    initial_value: '0.0'

  - id: g_conso_ph_totale
    type: float
    restore_value: yes
    initial_value: '0.0'

  - id: g_conso_ph_jour
    type: float
    restore_value: yes
    initial_value: '0.0'


select:
  - platform: template
    name: "Mode_Fonctionnement_regul_ph"
    optimistic: true
    restore_value: true
    options:
      - Auto
      - Ma_f
      - At_f
    id: _Mode_Fonctionnement_regul_ph
    on_value:
      then:
        - logger.log:
            format: "Mode Fonct Regul pH --> %s"
            args: [ 'id(_Mode_Fonctionnement_regul_ph).current_option().c_str()' ]
            level: INFO

        - if:
            condition:
              or:
                - lambda: 'return id(_Mode_Fonctionnement_regul_ph).current_option() == "Ma_f";'
                - lambda: 'return id(_Mode_Fonctionnement_regul_ph).current_option() == "At_f";'
            then:
              - script.stop: _regul_ph
              - delay: 1s
              - script.execute: _regul_ph


button:
  - platform: template
    name: "BP_Cycle_Regul_pH"
    on_press:
      - script.execute: _regul_ph


datetime:
  - platform: template
    id: heure_injection_ph
    type: time
    name: "Heure Injection pH"
    optimistic: true
    restore_value: true
    icon: mdi:clock-start

  - platform: template
    id: duree_injection_ph
    type: time
    name: "duree_injection_pH"
    optimistic: yes
    restore_value: true
    icon: mdi:clock


number:
  - platform: template
    name: "simule_pH"
    id: simul_ph_ezo
    optimistic: true
    restore_value: true
    mode: box
    min_value: 0
    max_value: 10
    unit_of_measurement: "pH"
    step: 0.01
    icon: mdi:ph

  - platform: template
    name: "pH_Cible"
    id: _ph_cible
    optimistic: true
    restore_value: true
    mode: box
    min_value: 6
    max_value: 7.6
    unit_of_measurement: "pH"
    step: 0.01

  - platform: template
    name: "pH_Hysteris"
    id: _ph_hysteresis
    optimistic: true
    restore_value: true
    mode: box
    min_value: 0
    max_value: 1
    unit_of_measurement: "pH"
    step: 0.01

  - platform: template
    name: "facteur_correction_ph"
    id: facteur_correction_ph
    optimistic: true
    restore_value: true
    initial_value: 50
    mode: box
    min_value: 1
    max_value: 100.0
    unit_of_measurement: "%"
    step: 0.1
    icon: mdi:percent

  - platform: template
    name: "debit_ppe_ph_moins"
    id: _debit_ppe_moins
    optimistic: true
    initial_value: 4.269
    restore_value: true
    mode: box
    min_value: 0.5
    max_value: 7.2
    unit_of_measurement: "l/h"
    step: 0.001

  - platform: template
    name: "durée_injection_phmoins"
    id: duree_inject_phmoins
    optimistic: true
    restore_value: true
    mode: box
    min_value: 0
    max_value: 120
    unit_of_measurement: "s"
    step: 1
    icon: mdi:clock


sensor:
  - platform: ezo
    id: ph_ezo
    name: "ph_ezo"
    address: 99
    unit_of_measurement: "pH"
    accuracy_decimals: 2
    state_class: measurement
    update_interval: 60s
    icon: mdi:ph
    filters:
      - sliding_window_moving_average:
          window_size: 15
          send_every: 1
          send_first_at: 1
      - calibrate_linear:
          - 4.76 -> 4.0
          - 7.50 -> 6.86
          - 9.49 -> 9.18
    on_value:
      then:
        - lambda: |-
            // ESP_LOGI("ph_ezo", "Mesure pH etalonnage: %.3f", id(ph_ezo).state);

  - platform: template
    id: ph_ezo_filtre
    name: "pH EZO Filtré"
    unit_of_measurement: "pH"
    accuracy_decimals: 2
    state_class: measurement
    icon: mdi:ph

  - platform: template
    name: "tps_injection_ph_moins"
    id: _tps_injection_ph_moins
    unit_of_measurement: "s"
    state_class: measurement
    icon: mdi:ph

  - platform: template
    name: "vol_injection_ph_moins"
    id: _vol_injection_ph_moins
    unit_of_measurement: "l"
    accuracy_decimals: 3
    state_class: measurement
    icon: mdi:ph

  - platform: duty_time
    id: _temps_fonctionnement_ppe_ph
    name: "temps_ma_ppe_ph"
    lambda: "return id(cde_ppe_ph_moins).state == true;"
    restore: true
    icon: mdi:pump
    filters:
      - round: 0

  - platform: template
    name: "Conso_pH_Totale"
    id: conso_ph_totale
    lambda: "return id(g_conso_ph_totale);"
    update_interval: 60s
    unit_of_measurement: "l"
    accuracy_decimals: 3
    icon: mdi:counter
    state_class: total_increasing
    device_class: water

  - platform: template
    name: "Conso_pH_Jour"
    id: conso_ph_jour
    lambda: "return id(g_conso_ph_jour);"
    update_interval: 60s
    unit_of_measurement: "l"
    accuracy_decimals: 3
    icon: mdi:counter
    state_class: total_increasing
    device_class: water


switch:
  - platform: gpio
    name: "cde_ppe_ph_moins"
    pin: ${GPIO_rel_ppe_ph}
    id: cde_ppe_ph_moins


interval:
  - interval: 60s
    then:
      - lambda: |-
          auto now = id(sntp_time).now();

          if (now.is_valid()) {
            if (now.hour == id(heure_injection_ph).hour &&
                now.minute == id(heure_injection_ph).minute) {
              id(_regul_ph).execute();
            }
          }

  - interval: 5s
    then:
      - script.execute: _memorisation_ph
      - script.execute: _securisation_regul_ph


script:
  - id: _memorisation_ph
    then:
      - lambda: |-
          bool ph_valide = !isnan(id(ph_ezo).state) &&
                           id(ph_ezo).state > 0.0f &&
                           id(ph_ezo).state < 14.0f;

          bool tempo_filtration_ok = id(flag_tempo_ppe_filtre);

          if (ph_valide && tempo_filtration_ok) {
            id(g_memoire_ph) = id(ph_ezo).state;

            ESP_LOGD("pH",
              "pH actualise a %.2f - ph_valide=%d tempo_filtration=%d",
              id(g_memoire_ph),
              ph_valide,
              tempo_filtration_ok
            );
          } else {
            ESP_LOGD("pH",
              "pH non actualise - ph_valide=%d tempo_filtration=%d pH_inst=%.2f mem=%.2f",
              ph_valide,
              tempo_filtration_ok,
              id(ph_ezo).state,
              id(g_memoire_ph)
            );
          }

          id(ph_ezo_filtre).publish_state(id(g_memoire_ph));


  - id: _regul_ph
    mode: single
    then:
      - logger.log:
          format: "Regul pH: mode=%s mem_ph=%.2f ph=%.2f cible=%.2f hyst=%.2f filtration=%d tempo=%d debit=%.3f"
          args:
            - 'id(_Mode_Fonctionnement_regul_ph).current_option().c_str()'
            - 'id(g_memoire_ph)'
            - 'id(ph_ezo).state'
            - 'id(_ph_cible).state'
            - 'id(_ph_hysteresis).state'
            - 'id(cde_ppe_filtration).state'
            - 'id(flag_tempo_ppe_filtre)'
            - 'id(_debit_ppe_moins).state'
          level: INFO

      # ============================================================
      # MODE AUTO
      # ============================================================
      - if:
          condition:
            lambda: 'return id(_Mode_Fonctionnement_regul_ph).current_option() == "Auto";'
          then:
            - lambda: |-
                id(g_tps_injection_ph_moins) = 0.0f;

                const float mem_ph = id(g_memoire_ph);
                const float ph_instant = id(ph_ezo).state;
                const float cible = id(_ph_cible).state;
                const float hyst = id(_ph_hysteresis).state;
                const float seuil = cible + hyst;
                const float debit_l_h = id(_debit_ppe_moins).state;
                const float facteur = id(facteur_correction_ph).state / 100.0f;

                const bool ph_mem_valide = !isnan(mem_ph) && mem_ph > 0.0f && mem_ph < 14.0f;
                const bool ph_inst_valide = !isnan(ph_instant) && ph_instant > 0.0f && ph_instant < 14.0f;
                const bool filtration_ok = id(cde_ppe_filtration).state;
                const bool tempo_ok = id(flag_tempo_ppe_filtre);
                const bool debit_ok = !isnan(debit_l_h) && debit_l_h > 0.0f;
                const bool ph_trop_haut = ph_mem_valide && mem_ph > seuil;

                char raison[96];

                if (!ph_mem_valide) {
                  snprintf(raison, sizeof(raison), "pH memorise invalide");
                } else if (!filtration_ok) {
                  snprintf(raison, sizeof(raison), "filtration arretee");
                } else if (!tempo_ok) {
                  snprintf(raison, sizeof(raison), "tempo filtration non atteinte");
                } else if (!debit_ok) {
                  snprintf(raison, sizeof(raison), "debit pompe invalide");
                } else if (!ph_trop_haut) {
                  snprintf(raison, sizeof(raison), "pH dans la plage");
                } else {
                  snprintf(raison, sizeof(raison), "injection autorisee");
                }

                const bool injection_autorisee =
                  ph_mem_valide &&
                  filtration_ok &&
                  tempo_ok &&
                  debit_ok &&
                  ph_trop_haut;

                if (injection_autorisee) {
                  const float ecart = fabs(mem_ph - cible);

                  const float volume_piscine = 43.2f;
                  const float quantite_ref_ph = 0.2f;

                  const float quantite_totale_l =
                    (ecart / 0.1f) * quantite_ref_ph * (volume_piscine / 10.0f);

                  const float quantite_cycle_l = quantite_totale_l * facteur;
                  const float debit_l_s = debit_l_h / 3600.0f;

                  float duree = quantite_cycle_l / debit_l_s;

                  duree = std::max(1.0f, std::min(duree, 600.0f));

                  const float volume_reel_l = debit_l_h * duree / 3600.0f;

                  id(g_tps_injection_ph_moins) = duree;
                  id(_tps_injection_ph_moins).publish_state(duree);
                  id(_vol_injection_ph_moins).publish_state(volume_reel_l);

                  ESP_LOGI("regul_ph",
                    "Injection pH autorisee: mem=%.2f cible=%.2f seuil=%.2f ecart=%.2f facteur=%.1f%% duree=%.0fs volume=%.3fL debit=%.3fL/h",
                    mem_ph,
                    cible,
                    seuil,
                    ecart,
                    facteur * 100.0f,
                    duree,
                    volume_reel_l,
                    debit_l_h
                  );

                } else {
                  id(g_tps_injection_ph_moins) = 0.0f;
                  id(_tps_injection_ph_moins).publish_state(0);
                  id(_vol_injection_ph_moins).publish_state(0);

                  char ph_inst_txt[32];
                  if (ph_inst_valide) {
                    snprintf(ph_inst_txt, sizeof(ph_inst_txt), "%.2f", ph_instant);
                  } else {
                    snprintf(ph_inst_txt, sizeof(ph_inst_txt), "INVALIDE");
                  }

                  ESP_LOGI("regul_ph",
                    "Pas injection pH: raison=%s mem=%.2f ph=%.2f cible=%.2f seuil=%.2f filtration=%d tempo=%d debit=%.3f",
                    raison,
                    mem_ph,
                    ph_instant,
                    cible,
                    seuil,
                    filtration_ok,
                    tempo_ok,
                    debit_l_h
                  );

                  char tg[384];
                  snprintf(tg, sizeof(tg),
                    "ESP178 pH PAS injection | raison=%s | pH=%.2f | cible=%.2f | seuil=%.2f | filt=%s | tempo=%s",
                    raison,
                    mem_ph,
                    cible,
                    seuil,
                    filtration_ok ? "ON" : "OFF",
                    tempo_ok ? "OK" : "NON"
                  );

                  char logbuf[1024];
                  snprintf(logbuf, sizeof(logbuf),
                    "ESP178 pH PAS injection | Raison=%s | pH memorise=%.2f | pH instantane=%s | Cible=%.2f | Hysteresis=%.2f | Seuil=%.2f | Filtration=%s | Tempo filtration=%s | Debit=%.3f L/h | Mode=Auto",
                    raison,
                    mem_ph,
                    ph_inst_txt,
                    cible,
                    hyst,
                    seuil,
                    filtration_ok ? "ON" : "OFF",
                    tempo_ok ? "OK" : "NON",
                    debit_l_h
                  );

                  std::string mess_tg = tg;
                  std::string mess_log = logbuf;

                  id(_message_telegram)->execute(mess_tg.c_str(), 0);
                  id(_log_fichier)->execute(mess_log.c_str(), 0);
                }

            - lambda: |-
                CONVERT_SECONDS(id(g_tps_injection_ph_moins), id(g_hh), id(g_mm), id(g_ss));

            - datetime.time.set:
                id: duree_injection_ph
                time: !lambda |-
                  return {
                    second: static_cast<uint8_t>(id(g_ss)),
                    minute: static_cast<uint8_t>(id(g_mm)),
                    hour: static_cast<uint8_t>(id(g_hh))
                  };

            - if:
                condition:
                  lambda: 'return id(g_tps_injection_ph_moins) > 0.0f;'
                then:
                  - lambda: |-
                      const float duree = id(g_tps_injection_ph_moins);
                      const float debit_l_h = id(_debit_ppe_moins).state;
                      const float volume_l = debit_l_h * duree / 3600.0f;
                      const float mem_ph = id(g_memoire_ph);
                      const float cible = id(_ph_cible).state;
                      const float hyst = id(_ph_hysteresis).state;
                      const float seuil = cible + hyst;
                      const float ecart = mem_ph - cible;
                      const float facteur = id(facteur_correction_ph).state;

                      CONVERT_SECONDS(duree, id(g_hh), id(g_mm), id(g_ss));

                      char tg[384];
                      snprintf(tg, sizeof(tg),
                        "ESP178 pH DEBUT injection | pH=%.2f | cible=%.2f | seuil=%.2f | ecart=%.2f | duree=%02d:%02d:%02d | vol=%.3f L",
                        mem_ph,
                        cible,
                        seuil,
                        ecart,
                        id(g_hh),
                        id(g_mm),
                        id(g_ss),
                        volume_l
                      );

                      char logbuf[1024];
                      snprintf(logbuf, sizeof(logbuf),
                        "ESP178 pH DEBUT injection | Mode=Auto | pH memorise=%.2f | Cible=%.2f | Hysteresis=%.2f | Seuil=%.2f | Ecart=%.2f | Facteur=%.1f %% | Debit=%.3f L/h | Duree=%02d:%02d:%02d | Volume prevu=%.3f L | Filtration=ON | Tempo=OK",
                        mem_ph,
                        cible,
                        hyst,
                        seuil,
                        ecart,
                        facteur,
                        debit_l_h,
                        id(g_hh),
                        id(g_mm),
                        id(g_ss),
                        volume_l
                      );

                      std::string mess_tg = tg;
                      std::string mess_log = logbuf;

                      id(_message_telegram)->execute(mess_tg.c_str(), 0);
                      id(_log_fichier)->execute(mess_log.c_str(), 0);

                  - switch.turn_on: cde_ppe_ph_moins

                  - logger.log:
                      format: "Marche pompe pH moins en Auto"
                      level: INFO

                  - delay: !lambda "return id(g_tps_injection_ph_moins) * 1000;"

                  - switch.turn_off: cde_ppe_ph_moins

                  - logger.log:
                      format: "Arret pompe pH moins en Auto"
                      level: INFO

                  - lambda: |-
                      const float debit_l_h = id(_debit_ppe_moins).state;
                      const float duree = id(g_tps_injection_ph_moins);
                      const float volume_l = debit_l_h * duree / 3600.0f;

                      id(g_conso_ph_totale) += volume_l;
                      id(g_conso_ph_jour) += volume_l;

                      id(conso_ph_totale).publish_state(id(g_conso_ph_totale));
                      id(conso_ph_jour).publish_state(id(g_conso_ph_jour));

                      CONVERT_SECONDS(duree, id(g_hh), id(g_mm), id(g_ss));

                      char tg[384];
                      snprintf(tg, sizeof(tg),
                        "ESP178 pH FIN injection | duree=%02d:%02d:%02d | vol=%.3f L | jour=%.3f L | total=%.3f L | pH_avant=%.2f",
                        id(g_hh),
                        id(g_mm),
                        id(g_ss),
                        volume_l,
                        id(g_conso_ph_jour),
                        id(g_conso_ph_totale),
                        id(g_memoire_ph)
                      );

                      char logbuf[1024];
                      snprintf(logbuf, sizeof(logbuf),
                        "ESP178 pH FIN injection | Resultat=cycle termine normalement | Duree injectee=%02d:%02d:%02d | Volume injecte=%.3f L | Conso jour=%.3f L | Conso totale=%.3f L | pH avant injection=%.2f | Cible=%.2f | Prochaine mesure apres brassage",
                        id(g_hh),
                        id(g_mm),
                        id(g_ss),
                        volume_l,
                        id(g_conso_ph_jour),
                        id(g_conso_ph_totale),
                        id(g_memoire_ph),
                        id(_ph_cible).state
                      );

                      std::string mess_tg = tg;
                      std::string mess_log = logbuf;

                      id(_message_telegram)->execute(mess_tg.c_str(), 0);
                      id(_log_fichier)->execute(mess_log.c_str(), 0);

                else:
                  - switch.turn_off: cde_ppe_ph_moins
                  - logger.log:
                      format: "Pompe pH moins arretee - aucune injection Auto"
                      level: INFO


      # ============================================================
      # MODE MARCHE FORCEE
      # ============================================================
      - if:
          condition:
            lambda: 'return id(_Mode_Fonctionnement_regul_ph).current_option() == "Ma_f";'
          then:
            - if:
                condition:
                  switch.is_on: cde_ppe_filtration
                then:
                  - switch.turn_on: cde_ppe_ph_moins

                  - logger.log:
                      format: "Marche forcee pompe pH autorisee"
                      level: INFO

                  - lambda: |-
                      char ph_inst_txt[32];

                      if (!isnan(id(ph_ezo).state)) {
                        snprintf(ph_inst_txt, sizeof(ph_inst_txt), "%.2f", id(ph_ezo).state);
                      } else {
                        snprintf(ph_inst_txt, sizeof(ph_inst_txt), "INVALIDE");
                      }

                      char tg[384];
                      snprintf(tg, sizeof(tg),
                        "ESP178 pH MARCHE forcee | pompe=ON | filt=ON | pH=%.2f | cible=%.2f | debit=%.3f L/h",
                        id(g_memoire_ph),
                        id(_ph_cible).state,
                        id(_debit_ppe_moins).state
                      );

                      char logbuf[1024];
                      snprintf(logbuf, sizeof(logbuf),
                        "ESP178 pH MARCHE forcee | Pompe pH=ON | Filtration=ON | pH memorise=%.2f | pH instantane=%s | Cible=%.2f | Debit=%.3f L/h",
                        id(g_memoire_ph),
                        ph_inst_txt,
                        id(_ph_cible).state,
                        id(_debit_ppe_moins).state
                      );

                      std::string mess_tg = tg;
                      std::string mess_log = logbuf;

                      id(_message_telegram)->execute(mess_tg.c_str(), 0);
                      id(_log_fichier)->execute(mess_log.c_str(), 0);

                else:
                  - switch.turn_off: cde_ppe_ph_moins

                  - logger.log:
                      format: "Marche forcee pH refusee - filtration arretee"
                      level: WARN

                  - lambda: |-
                      char tg[384];
                      snprintf(tg, sizeof(tg),
                        "ESP178 pH MARCHE forcee refusee | raison=filtration arretee | pompe=OFF | pH=%.2f | cible=%.2f",
                        id(g_memoire_ph),
                        id(_ph_cible).state
                      );

                      char logbuf[1024];
                      snprintf(logbuf, sizeof(logbuf),
                        "ESP178 pH MARCHE forcee refusee | Raison=filtration arretee | Pompe pH=OFF | pH memorise=%.2f | Cible=%.2f",
                        id(g_memoire_ph),
                        id(_ph_cible).state
                      );

                      std::string mess_tg = tg;
                      std::string mess_log = logbuf;

                      id(_message_telegram)->execute(mess_tg.c_str(), 0);
                      id(_log_fichier)->execute(mess_log.c_str(), 0);


      # ============================================================
      # MODE ARRET FORCE
      # ============================================================
      - if:
          condition:
            lambda: 'return id(_Mode_Fonctionnement_regul_ph).current_option() == "At_f";'
          then:
            - switch.turn_off: cde_ppe_ph_moins

            - logger.log:
                format: "Arret force pompe pH"
                level: INFO

            - lambda: |-
                char ph_inst_txt[32];

                if (!isnan(id(ph_ezo).state)) {
                  snprintf(ph_inst_txt, sizeof(ph_inst_txt), "%.2f", id(ph_ezo).state);
                } else {
                  snprintf(ph_inst_txt, sizeof(ph_inst_txt), "INVALIDE");
                }

                char tg[384];
                snprintf(tg, sizeof(tg),
                  "ESP178 pH ARRET force | pompe=OFF | mode=At_f | pH=%.2f | cible=%.2f",
                  id(g_memoire_ph),
                  id(_ph_cible).state
                );

                char logbuf[1024];
                snprintf(logbuf, sizeof(logbuf),
                  "ESP178 pH ARRET force | Pompe pH=OFF | Mode=At_f | pH memorise=%.2f | pH instantane=%s | Cible=%.2f",
                  id(g_memoire_ph),
                  ph_inst_txt,
                  id(_ph_cible).state
                );

                std::string mess_tg = tg;
                std::string mess_log = logbuf;

                id(_message_telegram)->execute(mess_tg.c_str(), 0);
                id(_log_fichier)->execute(mess_log.c_str(), 0);


  # ============================================================
  # SECURISATION REGULATION PH
  # ============================================================
  - id: _securisation_regul_ph
    mode: single
    then:
      - if:
          condition:
            and:
              - lambda: 'return id(_Mode_Fonctionnement_regul_ph).current_option() == "Auto";'
              - lambda: 'return id(g_memoire_ph) < id(_ph_cible).state;'
              - script.is_running: _regul_ph
          then:
            - logger.log:
                format: "Arret securise pH: mem_ph=%.2f cible=%.2f"
                args:
                  - 'id(g_memoire_ph)'
                  - 'id(_ph_cible).state'
                level: WARN

            - script.stop: _regul_ph

            - switch.turn_off: cde_ppe_ph_moins

            - lambda: |-
                const float duree_prevue = id(g_tps_injection_ph_moins);
                const float debit_l_h = id(_debit_ppe_moins).state;
                const float volume_prevu_l = debit_l_h * duree_prevue / 3600.0f;

                CONVERT_SECONDS(duree_prevue, id(g_hh), id(g_mm), id(g_ss));

                char tg[384];
                snprintf(tg, sizeof(tg),
                  "ESP178 pH ARRET securise | raison=pH sous cible | pH=%.2f | cible=%.2f | pompe=OFF | vol_max=%.3f L",
                  id(g_memoire_ph),
                  id(_ph_cible).state,
                  volume_prevu_l
                );

                char logbuf[1024];
                snprintf(logbuf, sizeof(logbuf),
                  "ESP178 pH ARRET securise | Raison=pH passe sous la cible pendant injection | Pompe pH=OFF | Mode=Auto | pH memorise=%.2f | Cible=%.2f | Hysteresis=%.2f | Duree cycle prevue=%02d:%02d:%02d | Volume prevu max=%.3f L | Debit=%.3f L/h | Action=injection stoppee pour eviter surdosage",
