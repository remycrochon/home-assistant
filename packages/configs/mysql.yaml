
# Enregistrement Base de Données externe MySql
# https://www.home-assistant.io/integrations/recorder/
recorder:
  db_url: !secret db_mysql
  auto_purge: true
  auto_repack: true
  commit_interval: 30
  purge_keep_days: 10

  include:
    domains:
      - binary_sensor
      - input_boolean
      - input_datetime
      - input_number
      - input_select
      - number
      - sensor
      - switch
      - light
      - utility_meter
      - vacuum
      - sun
      - device_tracker
      - weather
      - person
      - climate
      - lawn_mower

  exclude:
    domains:
      - camera
      - zone
      - automation
      - cover
      - script
      - alarm_control_panel
      - persistent_notification
      - update
      - conversation
      - tag
      - event
      - notify
      - select
      - remote
      - media_player
      - calendar
      - image
      - time
      - text
      - button
      - group

    entities:
      - sensor.temps_de_fonctionnement_vmc_n0
      - sensor.btc_mm_6h
      - sensor.pc_bureau_uptime_secondes