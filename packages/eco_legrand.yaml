# ===================================================================
# EcoCompteur Legrand
# Lecture unique de http://192.168.0.26/inst.json
# ===================================================================

rest:
  - resource: "http://192.168.0.26/inst.json"
    method: GET
    scan_interval: 5
    timeout: 5
    sensor:
      - name: "EcoCompteur ECS"
        unique_id: "ecocompteur_ecs"
        value_template: >-
          {{ value_json.data1 | float(0) | round(2) }}
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement

      - name: "EcoCompteur WC"
        unique_id: "ecocompteur_wc"
        value_template: >-
          {{ value_json.data2 | float(0) | round(2) }}
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement

      - name: "EcoCompteur PAC"
        unique_id: "ecocompteur_pac"
        value_template: >-
          {{ value_json.data3 | float(0) | round(2) }}
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement

      - name: "EcoCompteur Clim"
        unique_id: "ecocompteur_clim"
        value_template: >-
          {{ value_json.data4 | float(0) | round(2) }}
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement

      - name: "EcoCompteur VMC Niv0 brut"
        unique_id: "ecocompteur_vmc_niv0_brut"
        value_template: >-
          {{ value_json.data5 | float(0) | round(2) }}
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement

      - name: "EcoCompteur Date Time"
        unique_id: "ecocompteur_date_time"
        value_template: >-
          {{ value_json.Date_Time }}