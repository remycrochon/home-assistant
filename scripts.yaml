'1706464871250':
  alias: Volets RTS Fermeture
  sequence:
  - data: {}
    target:
      entity_id:
      - cover.volet_sdb_rts
      - cover.volet_parents_grand_zb_volets
      - cover.volet_ch_parts_petit
      - cover.volet_salon_petit
      - cover.bureau_gauche_rts
      - cover.bureau_droit_rts
    action: cover.close_cover
  - if:
    - condition: or
      conditions:
      - condition: state
        entity_id: input_select.mode_volets_chamb_sud
        state:
        - Auto Général
      - condition: state
        entity_id: input_select.mode_volets_chamb_sud
        state:
        - Auto Pos Soleil
    then:
    - data: {}
      enabled: true
      action: cover.close_cover
      target:
        entity_id:
        - cover.volet_grand_ch_sud_zb
  - if:
    - condition: state
      entity_id: input_select.mode_volets_chamb_sud
      state:
      - Auto Général
    then:
    - data: {}
      enabled: true
      action: cover.close_cover
      target:
        entity_id: cover.volet_ch_sud
  - if:
    - condition: state
      entity_id: input_select.mode_volets_chamb_nord
      state:
      - Auto Général
    then:
    - action: cover.close_cover
      metadata: {}
      target:
        entity_id: cover.volet_ch_nord
      data: {}
  mode: single
  icon: mdi:window-shutter
  description: ''
0_0_1_ouverture_volets_rts:
  alias: Volets RTS Ouverture
  sequence:
  - target:
      entity_id:
      - cover.volet_cuisine
      - cover.volet_sdb_rts
      - cover.volet_sam_volets_zb
    data: {}
    action: cover.open_cover
  - target:
      entity_id:
      - cover.volet_salon_petit
    data: {}
    action: cover.open_cover
    enabled: true
  - delay:
      hours: 0
      minutes: 0
      seconds: 2
      milliseconds: 0
    enabled: true
  - if:
    - condition: state
      entity_id: input_select.mode_volets_bureau
      state:
      - Auto Général
    then:
    - action: cover.open_cover
      target:
        entity_id:
        - cover.bureau_droit_rts
        - cover.bureau_gauche_rts
      data: {}
    enabled: true
  - if:
    - condition: state
      entity_id: input_select.mode_volets_chamb_nord
      state:
      - Auto Général
    then:
    - action: cover.open_cover
      metadata: {}
      data: {}
      target:
        entity_id: cover.volet_ch_nord
  - delay:
      hours: 0
      minutes: 0
      seconds: 2
      milliseconds: 0
    enabled: true
  - if:
    - condition: or
      conditions:
      - condition: state
        entity_id: input_select.mode_volets_chamb_sud
        state:
        - Auto Général
      - condition: state
        entity_id: input_select.mode_volets_chamb_sud
        state:
        - Auto Pos Soleil
    then:
    - action: cover.open_cover
      data: {}
      target:
        entity_id:
        - cover.volet_grand_ch_sud_zb
  - if:
    - condition: state
      entity_id: input_select.mode_volets_chamb_sud
      state:
      - Auto Général
    then:
    - action: cover.open_cover
      data: {}
      target:
        entity_id: cover.volet_ch_sud
  mode: single
  icon: mdi:window-shutter-open
  description: ''
