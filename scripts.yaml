porte_sous_sol_up:
  alias: porte_sous_sol_up
  sequence:
  - service: switch.turn_on
    target:
      entity_id: switch.cde_porte_ssol
    data: {}
  - delay:
      hours: 0
      minutes: 0
      seconds: 2
      milliseconds: 0
  - service: switch.turn_off
    target:
      entity_id: switch.cde_porte_ssol
    data: {}
  - service: input_text.set_value
    data:
      value: open
    target:
      entity_id: input_text.mvt_porte_sous_sol
  mode: single
  icon: mdi:garage-open-variant
